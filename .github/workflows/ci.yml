name: CI — Build & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines --registry https://registry.npmjs.org

      - name: Type check
        run: npm run lint

      - name: Build web app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-web-build-${{ github.run_number }}
          path: dist/
          retention-days: 7

      - name: Notify success
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ *UnNoted Web — Build %23${{ github.run_number }} مكتمل*%0A%0A🌿 Branch: \`${{ github.ref_name }}\`%0A📝 Commit: \`${{ github.sha }}\`%0A%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *UnNoted Web — فشل البناء في Build %23${{ github.run_number }}*%0A%0A🌿 Branch: \`${{ github.ref_name }}\`%0A%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
