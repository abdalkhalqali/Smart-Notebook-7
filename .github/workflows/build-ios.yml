name: Build iOS IPA → Telegram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Build web app
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Add iOS platform (always sync)
        run: |
          if [ ! -d "ios" ]; then
            echo "ios/ not in repo — running cap add ios"
            npx cap add ios
          else
            echo "ios/ found in repo"
          fi
          echo "=== ios/ structure ==="
          find ios -maxdepth 3 -type f -name "*.plist" -o -name "Podfile" -o -name "*.xcodeproj" 2>/dev/null | head -20 || echo "No ios/ structure found"

      - name: Sync Capacitor
        run: |
          npx cap sync ios
          echo "=== After sync: ios/App contents ==="
          ls -la ios/App/ 2>/dev/null || echo "ios/App/ not found after sync"

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document 2>/dev/null || true
          pod --version

      - name: Pod install
        run: |
          echo "=== Searching for Podfile ==="
          find . -name "Podfile" -not -path "*/node_modules/*" 2>/dev/null

          PODFILE=$(find . -name "Podfile" -not -path "*/node_modules/*" 2>/dev/null | head -1)

          if [ -z "$PODFILE" ]; then
            echo "❌ Podfile not found. Checking ios/ directory:"
            ls -la ios/ 2>/dev/null || echo "ios/ missing"
            ls -la ios/App/ 2>/dev/null || echo "ios/App/ missing"
            echo "Trying to create ios project manually..."
            npx cap add ios --no-interactive 2>&1 || true
            PODFILE=$(find . -name "Podfile" -not -path "*/node_modules/*" 2>/dev/null | head -1)
          fi

          if [ -z "$PODFILE" ]; then
            echo "❌ Still no Podfile. Cannot continue."
            exit 1
          fi

          PODFILE_DIR=$(dirname "$PODFILE")
          echo "✅ Podfile at: $PODFILE_DIR"
          echo "PODFILE_DIR=$PODFILE_DIR" >> $GITHUB_ENV

          cd "$PODFILE_DIR"
          pod install --repo-update 2>&1
          echo "✅ pod install done"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS (no code signing)
        run: |
          WORKSPACE="${{ env.PODFILE_DIR }}/App.xcworkspace"
          PROJECT="${{ env.PODFILE_DIR }}/App.xcodeproj"
          DERIVED="${{ github.workspace }}/DerivedData"

          if [ -d "$WORKSPACE" ]; then
            echo "Building with workspace..."
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$DERIVED" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 | tee /tmp/xcode.log
          elif [ -d "$PROJECT" ]; then
            echo "Building with project..."
            xcodebuild \
              -project "$PROJECT" \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$DERIVED" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 | tee /tmp/xcode.log
          else
            echo "❌ No xcworkspace or xcodeproj found at: ${{ env.PODFILE_DIR }}"
            exit 1
          fi

      - name: Find .app and package IPA
        id: package
        run: |
          APP=$(find "${{ github.workspace }}/DerivedData" -name "App.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "❌ App.app not found."
            grep "error:" /tmp/xcode.log | head -20
            exit 1
          fi
          echo "✅ Found: $APP"
          mkdir -p output/Payload
          cp -r "$APP" output/Payload/UnNoted.app
          cd output
          zip -r "UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" Payload
          SIZE=$(du -h "UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" | cut -f1)
          echo "✅ IPA: $SIZE"
          echo "ipa_size=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-iOS-unsigned-v${{ github.run_number }}
          path: output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa
          retention-days: 30

      - name: Send IPA to Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" \
            -F "caption=🍎 *UnNoted iOS IPA*%0A%0A✅ Build %23${{ github.run_number }} ناجح%0A📦 ${{ steps.package.outputs.ipa_size }}%0A🌿 ${{ github.ref_name }}%0A%0A⚠️ غير موقع — استخدم AltStore أو Sideloadly%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -F "parse_mode=Markdown"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *فشل iOS IPA*%0ABuild %23${{ github.run_number }}%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
