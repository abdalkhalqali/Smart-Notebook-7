name: Build iOS IPA → Telegram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Build web app
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods (required by Capacitor iOS)
        run: |
          sudo gem install cocoapods --no-document 2>/dev/null || true
          pod --version

      - name: Pod install (creates App.xcworkspace)
        working-directory: ios/App
        run: |
          pod install --repo-update
          echo "✅ pod install complete"
          ls -la

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available schemes
        working-directory: ios/App
        run: xcodebuild -workspace App.xcworkspace -list

      - name: Build iOS (no code signing)
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ github.workspace }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee /tmp/xcode-build.log
          echo "✅ xcodebuild complete"

      - name: Find .app bundle
        id: find_app
        run: |
          APP_PATH=$(find "${{ github.workspace }}/DerivedData" -name "App.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found. Xcode errors:"
            grep -E "error:|BUILD FAILED" /tmp/xcode-build.log | head -20
            exit 1
          fi
          echo "✅ Found: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Package unsigned IPA
        run: |
          mkdir -p output/Payload
          cp -r "${{ steps.find_app.outputs.app_path }}" output/Payload/UnNoted.app
          cd output
          zip -r "UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" Payload
          SIZE=$(du -h "UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" | cut -f1)
          echo "✅ IPA: $SIZE"
          echo "IPA_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-iOS-unsigned-v${{ github.run_number }}
          path: output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa
          retention-days: 30

      - name: Send IPA to Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa" \
            -F "caption=🍎 *UnNoted iOS IPA*%0A%0A✅ Build %23${{ github.run_number }} ناجح%0A📦 الحجم: ${{ env.IPA_SIZE }}%0A🌿 ${{ github.ref_name }}%0A%0A⚠️ غير موقع — استخدم AltStore أو Sideloadly للتثبيت%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -F "parse_mode=Markdown"

      - name: Notify failure on Telegram
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *فشل بناء iOS IPA*%0ABuild %23${{ github.run_number }}%0A%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
