name: Build Android APK → Telegram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Build web app (Vite only)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "Adding Android platform..."
            npx cap add android
            echo "✅ Android platform added"
          else
            echo "✅ Android directory already exists"
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          echo "✅ Capacitor sync complete"

      - name: Fix Gradle wrapper permissions
        run: chmod +x android/gradlew

      - name: Show Gradle version
        working-directory: android
        run: ./gradlew --version

      - name: Accept additional SDK licenses
        working-directory: android
        run: yes | ./gradlew --no-daemon dependencies > /dev/null 2>&1 || true

      - name: Build Debug APK
        working-directory: android
        run: |
          echo "🔨 Starting Gradle build..."
          ./gradlew assembleDebug \
            --no-daemon \
            --info \
            --stacktrace \
            2>&1 | tee /tmp/gradle-build.log
          echo "✅ Gradle build completed"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Verify APK exists
        id: verify_apk
        run: |
          echo "Searching for APKs..."
          find android/app/build -name "*.apk" 2>/dev/null || echo "No APKs found"
          
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            SIZE=$(du -h "$APK" | cut -f1)
            echo "✅ APK found: $SIZE"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found. Last 50 lines of build log:"
            tail -50 /tmp/gradle-build.log
            exit 1
          fi

      - name: Rename APK
        run: |
          mkdir -p output
          cp "${{ steps.verify_apk.outputs.apk_path }}" \
             "output/UnNoted-Android-v${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-Android-v${{ github.run_number }}
          path: output/UnNoted-Android-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Send APK to Telegram
        run: |
          APK_FILE="output/UnNoted-Android-v${{ github.run_number }}.apk"
          SIZE="${{ steps.verify_apk.outputs.apk_size }}"
          
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@${APK_FILE}" \
            -F "caption=📱 *UnNoted Android APK*%0A%0A✅ Build %23${{ github.run_number }} ناجح%0A📦 الحجم: ${SIZE}%0A🌿 Branch: ${{ github.ref_name }}%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -F "parse_mode=Markdown"

      - name: Send failure notification to Telegram
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *فشل بناء Android APK*%0A%0ABuild %23${{ github.run_number }}%0A%0Aانقر للتفاصيل:%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
