name: Build Android APK → Telegram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Build web app
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "Running npx cap add android..."
            npx cap add android
          else
            echo "android/ already exists in repo"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "✅ sdk.dir=$ANDROID_HOME"

      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      - name: Show settings.gradle (verify :app module is included)
        run: cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts 2>/dev/null || echo "settings.gradle not found"

      - name: Build :app:assembleDebug
        working-directory: android
        run: |
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            2>&1 | tee /tmp/gradle.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: Verify APK
        id: verify
        run: |
          echo "=== All APKs found ==="
          find android -name "*.apk" 2>/dev/null || echo "None found"

          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "❌ APK not found."
            echo "--- Build errors ---"
            grep -E "error:|FAILED|Caused by:|Exception" /tmp/gradle.log | head -30
            exit 1
          fi
          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK found: $SIZE"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT

      - name: Package APK
        run: |
          mkdir -p output
          cp "${{ steps.verify.outputs.apk_path }}" \
             "output/UnNoted-Android-v${{ github.run_number }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-Android-v${{ github.run_number }}
          path: output/UnNoted-Android-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Send APK to Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@output/UnNoted-Android-v${{ github.run_number }}.apk" \
            -F "caption=📱 *UnNoted Android APK*%0A%0A✅ Build %23${{ github.run_number }} ناجح%0A📦 ${{ steps.verify.outputs.apk_size }}%0A🌿 ${{ github.ref_name }}%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -F "parse_mode=Markdown"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ *فشل Android APK*%0ABuild %23${{ github.run_number }}%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
